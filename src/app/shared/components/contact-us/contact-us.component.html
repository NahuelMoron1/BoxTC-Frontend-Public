<div class="contact-container">
  <h1 class="section-title">Contáctanos</h1>
  <p class="subtitle">
    Ponete en contacto con BoxTC— ya sea que quieras publicar un artículo,
    reportar un problema o simplemente saludar.
  </p>

  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="form-grid">
    <div class="form-row">
      <input type="text" formControlName="firstName" placeholder="Nombre" />
      <input type="text" formControlName="lastName" placeholder="Apellido" />
    </div>

    <div class="form-row">
      <input
        type="email"
        formControlName="email"
        placeholder="Correo Electrónico"
      />
      <input
        type="text"
        formControlName="phone"
        placeholder="Teléfono (opcional)"
      />
    </div>

    <div class="form-row">
      <select formControlName="reason">
        <option value="" disabled selected>Selecciona el motivo</option>
        <option value="article">Enviar un artículo</option>
        <option value="bug">Reportar un error</option>
        <option value="other">Otro</option>
      </select>
    </div>

    <textarea
      formControlName="message"
      rows="6"
      placeholder="Escribí tu mensaje aquí..."
    ></textarea>

    <button type="submit" [disabled]="!contactForm.valid">
      Enviar Mensaje
    </button>
  </form>
</div>
