<div class="detail-container">
  <!-- Imagen editable con espacio reservado -->
  <div class="image-wrapper">
    <label class="image-dropzone">
      <span *ngIf="!imagePreview">📷 Haz clic para cargar imagen</span>
      <input type="file" (change)="onFileSelected($event)" />
      <img *ngIf="imagePreview" [src]="imagePreview" alt="Preview image" />
    </label>
  </div>

  <!-- Título editable -->
  <input
    type="text"
    [(ngModel)]="article.title"
    placeholder="Título del Artículo"
    class="title editable-input"
  />

  <!-- Autor y fecha -->
  <div class="meta editable-meta">
    <span class="by-label">Por</span>
    <input
      type="text"
      [(ngModel)]="article.author"
      placeholder="Autor"
      class="meta-input short"
    />
    <input type="date" [(ngModel)]="article.date" class="meta-input short" />
  </div>

  <textarea
    [(ngModel)]="article.summary"
    rows="3"
    placeholder="Resumen breve del artículo..."
    class="summary-textarea"
  ></textarea>

  <!-- Texto completo -->
  <textarea
    [(ngModel)]="article.text"
    rows="10"
    placeholder="Escribí tu artículo aquí..."
    class="full-text editable-textarea"
  ></textarea>

  <!-- Botón de guardar -->
  <div class="save-box">
    <button *ngIf="!articleSaved" (click)="submitArticle()">
      ✅ Guardar Artículo
    </button>

    <div *ngIf="articleSaved" class="saved-actions">
      <button class="saved" (click)="goToEdit()">✅ Editar Artículo</button>
      <button class="create-another" (click)="createAnotherArticle()">
        ➕ Crear Otro
      </button>
    </div>
  </div>
</div>
